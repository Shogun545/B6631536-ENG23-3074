apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      securityContext:
        runAsUser: 0      # รัน Pod เป็น root (เพื่อให้มีสิทธิ์จัดการไฟล์ระบบ)
        runAsGroup: 0     # รันกลุ่มเป็น root
        fsGroup: 0        # ให้สิทธิ์กลุ่มไฟล์เป็น root
        
      initContainers:
      - name: fix-permissions
        image: nginx:alpine
        command: ["sh", "-c", "chown -R 1000:1000 /var/jenkins_home"]
        volumeMounts:
        - name: jenkins-storage
          mountPath: /var/jenkins_home

      containers:
      - name: jenkins
        image: jenkins/jenkins:lts
        ports:
        - containerPort: 8080
        - containerPort: 50000
        volumeMounts:
        - name: jenkins-storage
          mountPath: /var/jenkins_home
        - name: docker-sock
          mountPath: /var/run/docker.sock
      
      volumes:
      - name: jenkins-storage
        persistentVolumeClaim:
          claimName: jenkins-pvc
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock # สำหรับ Docker Desktop บน Windows/Linux