apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins # ชื่อนี้คือตัว Jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts
        lifecycle:
          postStart:
            exec:
              command: 
              - /bin/sh
              - -c
              - |
                git config --system --add safe.directory '*'
                if [ ! -f /usr/local/bin/kubectl ]; then
                  curl -LO https://dl.k8s.io/release/v1.29.3/bin/linux/amd64/kubectl
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/
                fi
        env:
        - name: DOCKER_HOST
          value: "tcp://host.docker.internal:2375"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: jenkins-storage
          mountPath: /var/jenkins_home
      volumes:
      - name: jenkins-storage
        persistentVolumeClaim:
          claimName: jenkins-pvc