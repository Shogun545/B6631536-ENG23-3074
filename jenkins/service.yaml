apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
spec:
  type: NodePort
  selector:
    app: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30007
    - name: agent
      port: 50000
      targetPort: 50000
      # nodePort สำหรับ agent ไม่จำเป็นต้องระบุก็ได้ 
      # ให้ Kubernetes สุ่มให้ หรือจะระบุเป็น 30008 ก็ได้ครับ